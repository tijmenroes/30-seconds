<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9" />
      <stop offset="1" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <g filter="url(#shadow)">
    <rect x="90" y="90" width="1020" height="450" rx="36" fill="rgba(255,255,255,0.10)" />
  </g>

  <text x="600" y="320" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="120" font-weight="900" fill="#fff">
    30 Seconds
  </text>
  <text x="600" y="395" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="44" font-weight="600" fill="rgba(255,255,255,0.92)">
    Guess as many words as you can.
  </text>
</svg>
